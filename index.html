<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone 压缩工具 (FFmpeg版)</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>📱 iPhone 压缩工具 (FFmpeg版)</h1>
        
        <div class="upload" onclick="file.click()">
            <p>点击选择视频文件</p>
            <p style="font-size:12px;color:#999">支持 MP4/MOV，保留音频</p>
        </div>
        
        <input type="file" id="file" accept="video/*" onchange="selectFile(this)">
        
        <div class="level">
            <label><input type="radio" name="lv" value="low"> 模糊</label>
            <label><input type="radio" name="lv" value="medium" checked> 标准</label>
            <label><input type="radio" name="lv" value="high"> 高清</label>
        </div>
        
        <button id="btn" onclick="compress()" disabled>开始压缩</button>
        
        <!-- 上传进度条 -->
        <div id="uploadProgress" class="progress-container">
            <div class="progress-label">
                <span id="uploadLabel">上传中...</span>
                <span id="uploadPercent">0%</span>
            </div>
            <div class="progress-bar">
                <div id="uploadFill" class="progress-fill"></div>
            </div>
        </div>
        
        <!-- 压缩进度条 -->
        <div id="compressProgress" class="progress-container">
            <div class="progress-label">
                <span id="compressLabel">服务器压缩中...</span>
                <span id="compressPercent">0%</span>
            </div>
            <div class="progress-bar">
                <div id="compressFill" class="progress-fill"></div>
            </div>
        </div>
        
        <div class="compare" id="preview" style="display:none">
            <!-- 原始文件 -->
            <div class="box">
                <h3>原始</h3>
                <div id="orig"></div>
                <div class="info" id="origInfo"></div>
            </div>
            <!-- 压缩后文件 -->
            <div class="box">
                <h3>压缩后</h3>
                <div id="comp"></div>
                <div class="info" id="compInfo"></div>
            </div>
        </div>
        
        <button id="dlOriginal" onclick="downloadOriginal()">下载原视频</button>
        <div id="dlGroup" style="display:none;margin-top:10px">
            <button id="dl" onclick="download()">下载压缩视频</button>
        </div>
        
        <div class="note">
            <strong>FFmpeg版特点：</strong><br>
            ✓ 保留音频 ✓ 压缩质量高<br>
            ✗ 需要上传/下载文件（耗流量）
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
