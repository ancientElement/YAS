<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone 压缩工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: -apple-system, sans-serif;
            padding: 20px;
            background: #f5f5f5
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px
        }

        h1 {
            text-align: center;
            font-size: 20px;
            margin-bottom: 20px
        }

        .upload {
            border: 2px dashed #007AFF;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer
        }

        .level {
            margin: 20px 0;
            text-align: center
        }

        .level label {
            margin: 0 15px
        }

        button {
            background: #007AFF;
            color: #fff;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%
        }

        button:disabled {
            background: #ccc
        }

        .compare {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px
        }

        .box {
            text-align: center
        }

        .box h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px
        }

        .box video,
        .box img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px
        }

        .info {
            font-size: 12px;
            color: #666;
            margin-top: 5px
        }

        #file {
            display: none
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📱 iPhone 压缩工具</h1>
        <div class="upload" onclick="file.click()">
            <p>点击选择视频/照片</p>
            <p style="font-size:12px;color:#999">支持 MP4/MOV/JPG/PNG</p>
        </div>
        <input type="file" id="file" accept="video/*,image/*" onchange="selectFile(this)">
        <div class="level">
            <label><input type="radio" name="lv" value="0.7" checked> 低</label>
            <label><input type="radio" name="lv" value="0.5"> 中</label>
            <label><input type="radio" name="lv" value="0.3"> 高</label>
        </div>
        <button id="btn" onclick="compress()" disabled>开始压缩</button>
        <div class="compare" id="preview" style="display:none">
            <div class="box">
                <h3>原始</h3>
                <div id="orig"></div>
                <div class="info" id="origInfo"></div>
            </div>
            <div class="box">
                <h3>压缩后</h3>
                <div id="comp"></div>
                <div class="info" id="compInfo"></div>
            </div>
        </div>
        <button id="dl" style="display:none;margin-top:10px;background:#34C759" onclick="download()">下载压缩文件</button>
    </div>
    <script>
        let selectedFile, compressedBlob;
        function selectFile(input) { selectedFile = input.files[0]; btn.disabled = !selectedFile; preview.style.display = 'none'; dl.style.display = 'none' }
        function compress() {
            const lv = parseFloat(document.querySelector('input[name="lv"]:checked').value);
            btn.disabled = true; btn.textContent = '压缩中...';
            if (selectedFile.type.startsWith('image/')) compressImage(lv);
            else compressVideo(lv);
        }
        function compressImage(lv) {
            const img = new Image(), canvas = document.createElement('canvas'), ctx = canvas.getContext('2d');
            img.onload = () => { canvas.width = img.width * lv; canvas.height = img.height * lv; ctx.drawImage(img, 0, 0, canvas.width, canvas.height); canvas.toBlob(b => showResult(b, 'image'), 'image/jpeg', 0.9) };
            img.src = URL.createObjectURL(selectedFile);
            orig.innerHTML = `<img src="${img.src}">`; origInfo.textContent = `${(selectedFile.size / 1024 / 1024).toFixed(2)}MB`;
        }
        function compressVideo(lv) {
            const video = document.createElement('video'), canvas = document.createElement('canvas'), ctx = canvas.getContext('2d');
            video.muted = true; video.playsInline = true;
            video.onloadeddata = () => {
                const w = video.videoWidth * lv, h = video.videoHeight * lv;
                canvas.width = w; canvas.height = h;
                const stream = canvas.captureStream(), rec = new MediaRecorder(stream, { mimeType: 'video/webm' });
                const chunks = []; rec.ondataavailable = e => chunks.push(e.data); rec.onstop = () => { compressedBlob = new Blob(chunks, { type: 'video/webm' }); showResult(compressedBlob, 'video') };
                video.play(); rec.start(100);
                const draw = () => { if (video.paused || video.ended) { rec.stop(); return } ctx.drawImage(video, 0, 0, w, h); requestAnimationFrame(draw) };
                draw(); setTimeout(() => video.pause(), video.duration * 1000 || 5000);
            };
            video.src = URL.createObjectURL(selectedFile);
            orig.innerHTML = `<video src="${video.src}" controls muted loop></video>`;
            origInfo.textContent = `${(selectedFile.size / 1024 / 1024).toFixed(2)}MB`;
        }
        function showResult(blob, type) {
            compressedBlob = blob; preview.style.display = 'grid';
            const url = URL.createObjectURL(blob);
            comp.innerHTML = type === 'image' ? `<img src="${url}">` : `<video src="${url}" controls muted loop autoplay></video>`;
            compInfo.textContent = `${(blob.size / 1024 / 1024).toFixed(2)}MB (节省${((1 - blob.size / selectedFile.size) * 100).toFixed(0)}%)`;
            btn.disabled = false; btn.textContent = '开始压缩'; dl.style.display = 'block';
        }
        function download() {
            const a = document.createElement('a'); a.href = URL.createObjectURL(compressedBlob);
            a.download = 'compressed_' + selectedFile.name.replace(/\.[^.]+$/, '') + (compressedBlob.type.includes('image') ? '.jpg' : '.webm');
            a.click();
        }
    </script>
</body>

</html>
